services:
  postgres:
    image: postgres:18
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tokenmaxxing
      POSTGRES_PASSWORD: tokenmaxxing
      POSTGRES_DB: tokenmaxxing
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tokenmaxxing"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
